name: Publish to npm

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Clone Matterbridge
        run: git clone --depth 1 --single-branch --no-tags -b main https://github.com/Luligu/matterbridge.git ../matterbridge

      - name: Install Matterbridge dependencies
        working-directory: ../matterbridge
        run: npm ci --no-fund --no-audit

      - name: Build Matterbridge
        working-directory: ../matterbridge
        run: npm run build

      - name: Link Matterbridge globally
        working-directory: ../matterbridge
        run: npm link --no-fund --no-audit

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Link Matterbridge in project
        run: npm link matterbridge --no-fund --no-audit

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Test Vitest with coverage
        run: npm run test:vitest:coverage

      - name: Build
        run: npm run buildProduction

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: 'npm version patch -m "chore(release): v%s [skip ci]"'

      - name: Push version commit and tag
        run: git push --follow-tags

      - name: Publish
        run: npm publish --provenance --access public
